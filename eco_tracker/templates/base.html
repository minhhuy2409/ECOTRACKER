{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Eco Tracker</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v={% now 'U' %}">
</head>

<body>
    <script>
        // Immediate script to apply theme before rendering
        (function () {
            const currentTheme = localStorage.getItem('theme') || 'light';
            if (currentTheme === 'dark') {
                document.body.classList.add('dark-mode');
            }
        })();
    </script>

    <div class="app-layout">
        <script>
            // Immediate check to prevent sidebar flash on load
            if (localStorage.getItem('sidebar-collapsed') === 'true') {
                document.currentScript.parentElement.classList.add('sidebar-collapsed');
            }
        </script>
        {% include "components/sidebar.html" %}

        <main class="main-content">
            {% include "components/topbar.html" %}

            {% if messages %}
            <div class="message-container">
                {% for message in messages %}
                <div class="message-box {{ message.tags }}">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}

            {% block content %}
            {% endblock %}
        </main>
    </div>

    <script>
        // Theme & Sidebar Toggle Logic
        document.addEventListener("DOMContentLoaded", function () {
            const themeToggleBtn = document.getElementById("themeToggleBtn");
            if (themeToggleBtn) {
                // Set initial icon
                if (document.body.classList.contains("dark-mode")) {
                    themeToggleBtn.textContent = "☀️";
                } else {
                    themeToggleBtn.textContent = "🌙";
                }

                themeToggleBtn.addEventListener("click", function () {
                    document.body.classList.toggle("dark-mode");
                    const isDark = document.body.classList.contains("dark-mode");
                    localStorage.setItem("theme", isDark ? "dark" : "light");
                    themeToggleBtn.textContent = isDark ? "☀️" : "🌙";
                });
            }

            // Sidebar Toggle
            const sidebarToggleBtn = document.getElementById("sidebarToggleBtn");
            const appLayout = document.querySelector(".app-layout");
            if (sidebarToggleBtn && appLayout) {
                sidebarToggleBtn.addEventListener("click", function () {
                    appLayout.classList.toggle("sidebar-collapsed");
                    const isCollapsed = appLayout.classList.contains("sidebar-collapsed");
                    localStorage.setItem("sidebar-collapsed", isCollapsed ? "true" : "false");
                });
            }
        });
    </script>

</body>

</html>

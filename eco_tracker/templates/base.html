{% load static %}
<!DOCTYPE html>
<html lang="{{ current_lang|default:'en' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Tracker</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v={% now 'U' %}">
    
    <style>
    /* SIDEBAR - FIXED & CLEAN */
    .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        width: 260px;
        height: 100vh;
        transform: translateX(-100%);
        transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
        z-index: 1050;
        background: var(--panel, #fff);
        border-right: 1px solid var(--border);
    }
    
    .sidebar.active {
        transform: translateX(0);
    }
    
    .main-content {
        margin-left: 0;
        transition: margin-left 0.4s cubic-bezier(0.32, 0.72, 0, 1);
        padding-top: 70px; /* cho topbar */
    }
    
    .main-content.expanded {
        margin-left: 260px;
    }
    
    #sidebarToggleBtn {
        cursor: pointer;
        transition: all 0.3s;
    }

    #themeToggleBtn {
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        display: grid;
        place-items: center;
    }

    #themeToggleBtn:hover {
        transform: scale(1.1);
    }
    </style>
</head>
<body class="{% if request.session.theme == 'dark' %}dark-mode{% endif %}">

<div class="app-layout">
    {% include "components/sidebar.html" %}
    
    <main class="main-content">
        {% include "components/topbar.html" %}
        
        {% if messages %}
            <div class="message-container">
                {% for message in messages %}
                    <div class="message-box {{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
        
        {% block content %}{% endblock %}
    </main>
</div>

<script>
// Theme Toggle mượt + icon chuyển 
document.addEventListener("DOMContentLoaded", function() {
    const themeBtn = document.getElementById("themeToggleBtn");
    
    function updateThemeIcon() {
        if (!themeBtn) return;
        const isDark = document.body.classList.contains("dark-mode");
        themeBtn.style.transition = "transform 0.3s ease";
        themeBtn.textContent = isDark ? "☀️" : "🌙";
        
        // Hiệu ứng xoay nhẹ khi đổi
        themeBtn.style.transform = "rotate(0deg)";
        setTimeout(() => {
            themeBtn.style.transform = isDark ? "rotate(20deg)" : "rotate(-20deg)";
        }, 10);
    }

    if (themeBtn) {
        // Khởi tạo ngay
        updateThemeIcon();

        themeBtn.addEventListener("click", function() {
            // Thêm class để CSS transition màu nền
            document.body.classList.toggle("dark-mode");
            
            const isDark = document.body.classList.contains("dark-mode");
            localStorage.setItem("theme", isDark ? "dark" : "light");
            
            updateThemeIcon();
        });
    }

    // Sidebar (giữ nguyên)
    const toggleBtn = document.getElementById("sidebarToggleBtn");
    const sidebar = document.querySelector(".sidebar");
    const mainContent = document.querySelector(".main-content");

    if (toggleBtn && sidebar) {
        toggleBtn.addEventListener("click", () => {
            const willBeActive = !sidebar.classList.contains("active");
            sidebar.classList.toggle("active");
            if (mainContent) mainContent.classList.toggle("expanded");
            toggleBtn.classList.toggle("active");
            localStorage.setItem("sidebar-active", willBeActive);
        });
    }

    // Restore sidebar
    if (localStorage.getItem("sidebar-active") === "true" && sidebar) {
        sidebar.classList.add("active");
        if (mainContent) mainContent.classList.add("expanded");
        if (toggleBtn) toggleBtn.classList.add("active");
    }
});
</script>
</body>

</html>

<div class="card group-card">
    <p class="card-label">Group Challenge</p>

    {% if active_group %}
        <h2>{{ active_group.name }}</h2>

        <div class="group-info">
            <p>Members</p>
            <strong>{{ active_group.member_count }} / 5</strong>
        </div>

        <div class="group-info">
            <p>Status</p>
            <strong>Active</strong>
        </div>

        <a href="{% url 'groups' %}">
            <button class="secondary-btn">Open Group</button>
        </a>
    {% else %}
        <h2>No group yet</h2>
        <p class="muted-text">Create or join a group to compete with friends.</p>

        <a href="{% url 'groups' %}">
            <button class="secondary-btn">Create Group</button>
        </a>
    {% endif %}
</div>

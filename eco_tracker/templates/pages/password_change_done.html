{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 32px auto; padding: 32px; text-align: center;">
    <div style="font-size: 48px; margin-bottom: 16px;">🎉</div>
    <h2 style="font-size: 24px; font-weight: 800; color: var(--accent); margin-bottom: 12px;">Password Updated!</h2>
    <p style="font-size: 14px; color: var(--text-muted); line-height: 1.6; margin-bottom: 24px;">
        Your password has been changed successfully. You can now use your new password to sign in next time.
    </p>

    <a href="{% url 'profile' %}" style="display: inline-block; text-decoration: none;">
        <button class="upload-btn" style="padding: 13px 24px; font-size: 14px; font-weight: 800; border-radius: var(--radius-md); box-shadow: var(--shadow-sm); cursor: pointer; border: none; font-family: inherit; background: var(--primary); color: white; transition: var(--transition);">
            Back to Profile
        </button>
    </a>
</div>
{% endblock %}
